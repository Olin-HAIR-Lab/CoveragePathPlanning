# ── Mission Parameters ────────────────────────────────────────────────────────
mission:
  num_agents: 3
  mission_time: 900 # seconds — total battery life per drone
  sample_time: 180 # seconds — time spent at each sampling point
  speed: 5.0 # m/s — drone cruise speed
  d_safe: 5.0 # metres — minimum separation for collision avoidance

# ── Polygon (lat/lon vertices, closed ring not required) ──────────────────────
polygon:
  vertices:
    - [42.22428187982439, -71.25799270417033]
    - [42.22402216987305, -71.25757969429816]
    - [42.22450912515532, -71.25687596239312]
    - [42.224804713723074, -71.25723590395768]
# ── Depot ─────────────────────────────────────────────────────────────────────
depot:
  # Whether offset from center or directly coordinate based
  mode: coordinate
  # Depot coords (depot amount should match num_agents)
  depots: 
    - [42.224223441986425, -71.25787964981136]
    - [42.22417382100468, -71.25780462351591]
    - [42.22411444542027, -71.25771928826354]
  # Offset from polygon centre as fractions of map_width / map_height
  offset_x: -0.25 # negative = left of centre
  offset_y: -1.0 # negative = below centre
  # Per-drone x-nudge applied when building each route's coord list
  route_x_nudge: 0.3 # multiplied by map_height each iteration

# ── Lloyd's Algorithm ─────────────────────────────────────────────────────────
lloyd:
  iterations: 10
  partition: 300
  seed: 6
  # Set to null to auto-compute N from mission parameters;
  # set to an integer to override (useful during testing)
  n_dots_override: null

# ── VRP ───────────────────────────────────────────────────────────────────────
vrp:
  # "balanced" = fixed fleet, no recharge | "unlimited" = recharge allowed
  mode: balanced

# ── Output ────────────────────────────────────────────────────────────────────
output:
  json_file: output.json # set to null to skip JSON export
  drone_altitude: 6 # metres — z value appended to each 3-D waypoint

# ── Plotting / Animation ──────────────────────────────────────────────────────
animation:
  speed_multiplier: 8
  show_static_plot: true # set to true to also show the plot_results figure
